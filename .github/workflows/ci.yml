name: CI

on:
  pull_request:
    paths-ignore:
      - docs/Standards/**
  push:
    branches:
      - main
    paths-ignore:
      - docs/Standards/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eng/tooling
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /**
            !/docs/Standards
            !/docs/Standards/**

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: eng/tooling/package-lock.json

      - name: Install tooling dependencies
        run: npm ci

      - name: Validate contracts
        run: npm run validate:contracts

  dotnet:
    name: .NET Build And Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /**
            !/docs/Standards
            !/docs/Standards/**

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore SmartWarehouse.slnx

      - name: Verify formatting
        run: dotnet format SmartWarehouse.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build SmartWarehouse.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test SmartWarehouse.slnx --configuration Release --no-build

  go:
    name: Go Build And Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/simulation-host
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /**
            !/docs/Standards
            !/docs/Standards/**

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/simulation-host/go.mod
          cache-dependency-path: src/simulation-host/go.mod

      - name: Verify formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  compose:
    name: Compose Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /**
            !/docs/Standards
            !/docs/Standards/**

      - name: Validate compose file
        run: docker compose --env-file .env.example --profile infra --profile observability --profile apps config

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /**
            !/docs/Standards
            !/docs/Standards/**

      - name: Run gitleaks
        run: >
          docker run --rm
          -v "$PWD:/repo"
          -w /repo
          ghcr.io/gitleaks/gitleaks:v8.30.1
          detect --source . --no-git --config gitleaks.toml --redact
