name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eng/tooling
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: eng/tooling/package-lock.json

      - name: Install tooling dependencies
        run: npm ci

      - name: Validate contracts
        run: npm run validate:contracts

  dotnet:
    name: .NET Build And Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore SmartWarehouse.slnx

      - name: Build
        run: dotnet build SmartWarehouse.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test SmartWarehouse.slnx --configuration Release --no-build

  go:
    name: Go Build And Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/simulation-host
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/simulation-host/go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  compose:
    name: Compose Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose --env-file .env.example config
