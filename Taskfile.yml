version: '3'

tasks:
  bootstrap:
    cmds:
      - pwsh -NoProfile -File eng/scripts/bootstrap.ps1

  up:
    cmds:
      - pwsh -NoProfile -File eng/scripts/dev-up.ps1

  up-apps:
    cmds:
      - pwsh -NoProfile -File eng/scripts/dev-up.ps1 -IncludeApps

  down:
    cmds:
      - pwsh -NoProfile -File eng/scripts/dev-down.ps1

  validate-contracts:
    cmds:
      - pwsh -NoProfile -File eng/scripts/validate-contracts.ps1

  build-knowledge-map:
    cmds:
      - pwsh -NoProfile -File eng/scripts/build-knowledge-map.ps1

  build:
    cmds:
      - pwsh -NoProfile -File eng/scripts/dotnet.ps1 build SmartWarehouse.slnx

  test:
    cmds:
      - pwsh -NoProfile -File eng/scripts/dotnet.ps1 test SmartWarehouse.slnx

  test-e2e:
    cmds:
      - pwsh -NoProfile -File eng/scripts/test-e2e.ps1
