asyncapi: 3.1.0
info:
  title: "SmartWarehouse: канонический нижний контракт интеграции v0"
  version: 0.2.0
  description: |
    Машиночитаемая спецификация нижнего контракта интеграции для текущего базового состава.
    Точка зрения спецификации: платформа `WCS`.
    Платформа публикует команды и принимает события устройств.
    Спецификация синхронизирована с `ADR-004` и фиксирует полный минимальный набор
    общих команд, команд семейств ресурсов и событий устройств текущего `v0`.
defaultContentType: application/json
channels:
  requestStateSnapshotCommand:
    address: southbound.command.requestStateSnapshot
    messages:
      requestStateSnapshot:
        $ref: '#/components/messages/RequestStateSnapshotMessage'
  suspendExecutionCommand:
    address: southbound.command.suspendExecution
    messages:
      suspendExecution:
        $ref: '#/components/messages/SuspendExecutionMessage'
  resumeExecutionCommand:
    address: southbound.command.resumeExecution
    messages:
      resumeExecution:
        $ref: '#/components/messages/ResumeExecutionMessage'
  clearFaultCommand:
    address: southbound.command.clearFault
    messages:
      clearFault:
        $ref: '#/components/messages/ClearFaultMessage'
  acknowledgeAlarmCommand:
    address: southbound.command.acknowledgeAlarm
    messages:
      acknowledgeAlarm:
        $ref: '#/components/messages/AcknowledgeAlarmMessage'
  grantMotionWindowCommand:
    address: southbound.command.shuttle3d.grantMotionWindow
    messages:
      grantMotionWindow:
        $ref: '#/components/messages/GrantMotionWindowMessage'
  revokeMotionWindowCommand:
    address: southbound.command.shuttle3d.revokeMotionWindow
    messages:
      revokeMotionWindow:
        $ref: '#/components/messages/RevokeMotionWindowMessage'
  prepareTransferCommand:
    address: southbound.command.prepareTransfer
    messages:
      prepareTransfer:
        $ref: '#/components/messages/PrepareTransferMessage'
  commitTransferCommand:
    address: southbound.command.commitTransfer
    messages:
      commitTransfer:
        $ref: '#/components/messages/CommitTransferMessage'
  abortTransferCommand:
    address: southbound.command.abortTransfer
    messages:
      abortTransfer:
        $ref: '#/components/messages/AbortTransferMessage'
  executeActionCommand:
    address: southbound.command.executeAction
    messages:
      executeAction:
        $ref: '#/components/messages/ExecuteActionMessage'
  moveCarrierCommand:
    address: southbound.command.hybridLift.moveCarrier
    messages:
      moveCarrier:
        $ref: '#/components/messages/MoveCarrierMessage'
  heartbeatEvent:
    address: southbound.event.heartbeat
    messages:
      heartbeat:
        $ref: '#/components/messages/HeartbeatMessage'
  stateSnapshotEvent:
    address: southbound.event.stateSnapshot
    messages:
      stateSnapshot:
        $ref: '#/components/messages/StateSnapshotMessage'
  capabilityReportedEvent:
    address: southbound.event.capabilityReported
    messages:
      capabilityReported:
        $ref: '#/components/messages/CapabilityReportedMessage'
  capabilityChangedEvent:
    address: southbound.event.capabilityChanged
    messages:
      capabilityChanged:
        $ref: '#/components/messages/CapabilityChangedMessage'
  nodeReachedEvent:
    address: southbound.event.nodeReached
    messages:
      nodeReached:
        $ref: '#/components/messages/NodeReachedMessage'
  motionWindowProgressEvent:
    address: southbound.event.motionWindowProgress
    messages:
      motionWindowProgress:
        $ref: '#/components/messages/MotionWindowProgressMessage'
  transferReadyEvent:
    address: southbound.event.transferReady
    messages:
